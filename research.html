        // Compute links — require substantive alignment (themes + theories), not just shared methods.
        // Strength is weighted: themes matter most, then theories, then methods.
        function computeLinks(projects) {
          const links = [];
          for (let i = 0; i < projects.length; i++) {
            for (let j = i + 1; j < projects.length; j++) {
              const a = projects[i], b = projects[j];
              const sharedThemes = a.themes.filter(t => b.themes.includes(t));
              const sharedMethods = a.methods.filter(m => b.methods.includes(m));
              const sharedTheories = a.theories.filter(t => b.theories.includes(t));
              const t = sharedThemes.length, th = sharedTheories.length, m = sharedMethods.length;
              const qualifies = (t >= 2 && th >= 1) || t >= 3;
              if (!qualifies) continue;
              const strength = 2 * t + 1.5 * th + m;
              links.push({
                source: a.id, target: b.id,
                strength,
                shared: {
                  themes: sharedThemes,
                  methods: sharedMethods,
                  theories: sharedTheories,
                },
              });
            }
          }
          return links;
        }

        const ALL_LINKS = computeLinks(PROJECTS);

        // ── STAR FIELD COMPONENT ──
        function StarField() {
          const canvasRef = useRef(null);
          const starsRef = useRef([]);
          const frameRef = useRef(null);

          useEffect(() => {
            const canvas = canvasRef.current;
            if (!canvas) return;
            const ctx = canvas.getContext("2d");

            const resize = () => {
              canvas.width = canvas.parentElement.clientWidth;
              canvas.height = canvas.parentElement.clientHeight;
            };
            resize();
            window.addEventListener("resize", resize);

            // Generate stars
            const stars = [];
            for (let i = 0; i < 100; i++) {
              const isLarge = Math.random() < 0.15;
              stars.push({
                x: Math.random(),
                y: Math.random(),
                size: isLarge ? 1.5 + Math.random() * 2 : 0.5 + Math.random() * 1.2,
                baseOpacity: 0.2 + Math.random() * 0.6,
                twinkle: Math.random() > 0.35,
                phase: Math.random() * Math.PI * 2,
                speed: 0.3 + Math.random() * 0.8,
                driftX: (Math.random() - 0.5) * 0.00003,
                driftY: (Math.random() - 0.5) * 0.00003,
              });
            }
            starsRef.current = stars;

            let t = 0;
            const draw = () => {
              t += 0.016;
              ctx.clearRect(0, 0, canvas.width, canvas.height);

              stars.forEach(s => {
                s.x += s.driftX;
                s.y += s.driftY;
                if (s.x < -0.02) s.x = 1.02;
                if (s.x > 1.02) s.x = -0.02;
                if (s.y < -0.02) s.y = 1.02;
                if (s.y > 1.02) s.y = -0.02;

                const px = s.x * canvas.width;
                const py = s.y * canvas.height;
                let opacity = s.baseOpacity;

                if (s.twinkle) {
                  opacity *= 0.3 + 0.7 * (0.5 + 0.5 * Math.sin(t * s.speed + s.phase));
                }

                ctx.beginPath();
                ctx.arc(px, py, s.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(180, 195, 220, ${opacity})`;
                ctx.fill();

                // glow on larger stars
                if (s.size > 1.5) {
                  ctx.beginPath();
                  ctx.arc(px, py, s.size * 3, 0, Math.PI * 2);
                  ctx.fillStyle = `rgba(180, 195, 220, ${opacity * 0.12})`;
                  ctx.fill();
                }
              });

              frameRef.current = requestAnimationFrame(draw);
            };
            draw();

            return () => {
              window.removeEventListener("resize", resize);
              cancelAnimationFrame(frameRef.current);
            };
          }, []);

          return (
            <canvas
              ref={canvasRef}
              style={{
                position: "absolute", top: 0, left: 0, width: "100%", height: "100%",
                pointerEvents: "none",
              }}
            />
          );
        }

        function ResearchNetwork() {
          const svgRef = useRef(null);
          const containerRef = useRef(null);
          const [selected, setSelected] = useState(null);
          const [dims, setDims] = useState({ width: 900, height: 620 });
          const [activeFilter, setActiveFilter] = useState(null);
          const simRef = useRef(null);
          const nodesRef = useRef(null);
          const linksRef = useRef(null);
          const mouseRef = useRef({ x: 0, y: 0 });
          const floatPhaseRef = useRef(0);

          // Responsive
          useEffect(() => {
            const update = () => {
              if (containerRef.current) {
                const w = containerRef.current.clientWidth;
                const graphW = Math.max(400, w - 120); // 60px padding each side
                setDims({ width: graphW, height: Math.max(520, Math.min(700, graphW * 0.65)) });
              }
            };
            update();
            window.addEventListener("resize", update);
            return () => window.removeEventListener("resize", update);
          }, []);

          // Compute which nodes match current filter
          const matchingIds = useMemo(() => {
            if (!activeFilter) return null;
            const { type, id } = activeFilter;
            return new Set(PROJECTS.filter(p => p[type]?.includes(id)).map(p => p.id));
          }, [activeFilter]);

          // D3
          useEffect(() => {
            if (!svgRef.current) return;
            const { width, height } = dims;
            const svg = d3.select(svgRef.current);
            svg.selectAll("*").remove();

            // SVG defs for glows
            const defs = svg.append("defs");

            // Glow filters for published and R&R nodes
            ["published", "rr"].forEach(status => {
              const color = STATUS_META[status].color;
              const filter = defs.append("filter")
                .attr("id", `glow-${status}`)
                .attr("x", "-50%").attr("y", "-50%")
                .attr("width", "200%").attr("height", "200%");
              filter.append("feGaussianBlur").attr("in", "SourceGraphic").attr("stdDeviation", status === "published" ? 6 : 4).attr("result", "blur");
              filter.append("feColorMatrix").attr("in", "blur").attr("type", "matrix")
                .attr("values", `0 0 0 0 ${parseInt(color.slice(1,3),16)/255} 0 0 0 0 ${parseInt(color.slice(3,5),16)/255} 0 0 0 0 ${parseInt(color.slice(5,7),16)/255} 0 0 0 0.6 0`);
              const merge = filter.append("feMerge");
              merge.append("feMergeNode");
              merge.append("feMergeNode").attr("in", "SourceGraphic");
            });

            const nodes = PROJECTS.map(d => ({ ...d }));
            const links = ALL_LINKS.map(d => ({ ...d }));
            nodesRef.current = nodes;
            linksRef.current = links;

            // Measure each label's half-width so collision force keeps labels from overlapping
            const measureCtx = document.createElement("canvas").getContext("2d");
            measureCtx.font = "500 10px 'DM Sans', -apple-system, sans-serif";
            nodes.forEach(n => { n.labelHalfWidth = measureCtx.measureText(n.label).width / 2; });

            const sim = d3.forceSimulation(nodes)
              .force("link", d3.forceLink(links).id(d => d.id).distance(d => 140 - d.strength * 4).strength(d => 0.2 + d.strength * 0.03))
              .force("charge", d3.forceManyBody().strength(-400))
              .force("center", d3.forceCenter(width / 2, height / 2))
              .force("collision", d3.forceCollide().radius(d => {
                const ns = NODE_STYLE[d.status] || NODE_STYLE.wp;
                // Use label half-width so horizontally adjacent labels don't overlap
                return Math.max(ns.r + 22, d.labelHalfWidth + 12);
              }))
              .force("x", d3.forceX(width / 2).strength(0.05))
              .force("y", d3.forceY(height / 2).strength(0.05));
            simRef.current = sim;

            const g = svg.append("g");
            const zoom = d3.zoom().scaleExtent([0.4, 3]).on("zoom", e => g.attr("transform", e.transform));
            svg.call(zoom);

            // Links — weighted visual hierarchy so strong ties stand out and weak ones recede
            const linkMaxStrength = d3.max(links, d => d.strength) || 1;
            const linkOpacity = d3.scaleLinear().domain([3, linkMaxStrength]).range([0.15, 0.7]).clamp(true);
            const linkWidth = d3.scaleLinear().domain([3, linkMaxStrength]).range([0.3, 1.8]).clamp(true);
            const link = g.append("g").selectAll("line").data(links).join("line")
              .attr("stroke", "rgba(26,107,90,0.18)")
              .attr("stroke-width", d => linkWidth(d.strength))
              .attr("stroke-opacity", d => linkOpacity(d.strength));

            // Track mouse position for hover glow
            svg.on("mousemove", (e) => {
              const [mx, my] = d3.pointer(e);
              mouseRef.current = { x: mx, y: my };
            });

            // Node groups
            const node = g.append("g").selectAll("g").data(nodes).join("g")
              .style("cursor", "pointer")
              .call(d3.drag()
                .on("start", (e, d) => { if (!e.active) sim.alphaTarget(0.2).restart(); d.fx = d.x; d.fy = d.y; })
                .on("drag", (e, d) => { d.fx = e.x; d.fy = e.y; })
                .on("end", (e, d) => { if (!e.active) sim.alphaTarget(0); d.fx = null; d.fy = null; })
              );

            // Invisible hit area — makes small nodes easier to click/drag
            node.append("circle")
              .attr("r", d => Math.max((NODE_STYLE[d.status] || NODE_STYLE.wp).r + 10, 24))
              .attr("fill", "transparent")
              .attr("stroke", "none");

            // Glow circle (behind main, for published/rr)
            node.each(function(d) {
              const ns = NODE_STYLE[d.status] || NODE_STYLE.wp;
              if (ns.glow) {
                d3.select(this).append("circle")
                  .attr("r", ns.r)
                  .attr("fill", STATUS_META[d.status]?.color || "#666")
                  .attr("fill-opacity", d.status === "published" ? 0.2 : 0.15)
                  .attr("filter", `url(#glow-${d.status})`);
              }
            });

            // Main ring/fill circle
            node.append("circle")
              .attr("r", d => (NODE_STYLE[d.status] || NODE_STYLE.wp).r)
              .attr("fill", d => {
                const ns = NODE_STYLE[d.status] || NODE_STYLE.wp;
                if (ns.fillOpacity === 1) return STATUS_META[d.status]?.color || "#666";
                return "none";
              })
              .attr("fill-opacity", d => (NODE_STYLE[d.status] || NODE_STYLE.wp).fillOpacity)
              .attr("stroke", d => STATUS_META[d.status]?.color || "#666")
              .attr("stroke-width", d => (NODE_STYLE[d.status] || NODE_STYLE.wp).ringWidth)
              .attr("stroke-opacity", d => (NODE_STYLE[d.status] || NODE_STYLE.wp).strokeOpacity)
              .attr("stroke-dasharray", d => (NODE_STYLE[d.status] || NODE_STYLE.wp).dash);

            // Inner dot (for non-published)
            node.each(function(d) {
              const ns = NODE_STYLE[d.status] || NODE_STYLE.wp;
              if (ns.innerDot) {
                d3.select(this).append("circle")
                  .attr("r", d.status === "rr" ? 6 : d.status === "review" ? 5.5 : d.status === "progress" ? 4 : 5)
                  .attr("fill", STATUS_META[d.status]?.color || "#666")
                  .attr("fill-opacity", d.status === "progress" ? 0.5 : 0.75);
              }
            });

            // Labels — light text on dark background
            node.append("text")
              .text(d => d.label)
              .attr("y", d => (NODE_STYLE[d.status] || NODE_STYLE.wp).r + 14)
              .attr("text-anchor", "middle")
              .attr("font-family", "'DM Sans', -apple-system, sans-serif")
              .attr("font-size", "10px")
              .attr("font-weight", 500)
              .attr("fill", C.textSecondary);

            // Hover — show only the hovered node's top 4 strongest neighbors (fewer if it has fewer edges)
            const HOVER_TOP_K = 4;
            node.on("mouseover", function(e, d) {
              const topEdges = links
                .filter(l => l.source.id === d.id || l.target.id === d.id)
                .sort((a, b) => b.strength - a.strength)
                .slice(0, HOVER_TOP_K);
              const topEdgeSet = new Set(topEdges);
              const connected = new Set([d.id]);
              topEdges.forEach(l => { connected.add(l.source.id); connected.add(l.target.id); });
              node.transition().duration(150)
                .attr("opacity", n => connected.has(n.id) ? 1 : 0.12);
              link.transition().duration(150)
                .attr("stroke-opacity", l => topEdgeSet.has(l) ? 0.85 : 0.04)
                .attr("stroke", l => topEdgeSet.has(l) ? STATUS_META[d.status]?.color || C.teal : "rgba(26,107,90,0.18)");
            })
            .on("mouseout", () => {
              node.transition().duration(200).attr("opacity", 1);
              link.transition().duration(200)
                .attr("stroke-opacity", l => linkOpacity(l.strength))
                .attr("stroke", "rgba(26,107,90,0.18)");
            })
            .on("click", (e, d) => {
              e.stopPropagation();
              setSelected(prev => prev?.id === d.id ? null : d);
            });

            svg.on("click", () => setSelected(null));

            // Continuous gentle floating animation
            let floatFrame;
            const floatTick = () => {
              floatPhaseRef.current += 0.008;
              const t = floatPhaseRef.current;
              const mouse = mouseRef.current;

              node.attr("transform", d => {
                // Gentle per-node float using unique phase offsets
                const seed = d.id.length * 7 + d.id.charCodeAt(0);
                const floatX = Math.sin(t + seed * 0.5) * 2.5 + Math.cos(t * 0.7 + seed) * 1.5;
                const floatY = Math.cos(t * 0.8 + seed * 0.3) * 2 + Math.sin(t * 0.6 + seed * 0.7) * 1.5;

                return `translate(${d.x + floatX},${d.y + floatY})`;
              });

              link.attr("x1", d => d.source.x).attr("y1", d => d.source.y)
                .attr("x2", d => d.target.x).attr("y2", d => d.target.y);

              floatFrame = requestAnimationFrame(floatTick);
            };

            // Auto-fit kicks in while sim is still settling so the orbit accelerates into the zoom
            let didInitialFit = false;
            const fitToViewport = () => {
              const pad = 60; // leaves room for node radius + labels
              const xs = nodes.map(n => n.x);
              const ys = nodes.map(n => n.y);
              const minX = Math.min(...xs), maxX = Math.max(...xs);
              const minY = Math.min(...ys), maxY = Math.max(...ys);
              const bboxW = maxX - minX, bboxH = maxY - minY;
              if (bboxW <= 0 || bboxH <= 0) return;
              const scale = Math.min(2, (width - pad * 2) / bboxW, (height - pad * 2) / bboxH);
              const tx = width / 2 - ((minX + maxX) / 2) * scale;
              const ty = height / 2 - ((minY + maxY) / 2) * scale;
              svg.transition().duration(1500).ease(d3.easeCubicIn)
                .call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
            };
            const kickoff = () => {
              if (didInitialFit) return;
              didInitialFit = true;
              fitToViewport();
              floatFrame = requestAnimationFrame(floatTick);
            };

            sim.on("tick", () => {
              link.attr("x1", d => d.source.x).attr("y1", d => d.source.y)
                .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
              node.attr("transform", d => `translate(${d.x},${d.y})`);
              // Begin the zoom-to-fit before sim fully settles so orbit and zoom blend
              if (!didInitialFit && sim.alpha() < 0.1) kickoff();
            });

            sim.on("end", kickoff);
            // Fallback in case sim doesn't fully end
            setTimeout(kickoff, 3000);

            return () => { sim.stop(); cancelAnimationFrame(floatFrame); };
          }, [dims]);

          // Apply filter highlighting via D3 transitions
          useEffect(() => {
            if (!svgRef.current || !nodesRef.current) return;
            const svg = d3.select(svgRef.current);

            if (!matchingIds) {
              svg.selectAll("g g g").transition().duration(200).attr("opacity", 1);
              const maxS = d3.max(ALL_LINKS, d => d.strength) || 1;
              const opa = d3.scaleLinear().domain([3, maxS]).range([0.15, 0.7]).clamp(true);
              svg.selectAll("g g line").transition().duration(200).attr("stroke-opacity", d => opa(d.strength));
              return;
            }

            svg.selectAll("g g g").each(function(d) {
              d3.select(this).transition().duration(200)
                .attr("opacity", matchingIds.has(d?.id) ? 1 : 0.1);
            });
          }, [matchingIds]);

          const toggleFilter = (type, id) => {
            setActiveFilter(prev => (prev?.type === type && prev?.id === id) ? null : { type, id });
          };

          // Legend item renderer — SVG icons matching node rendering
          const legendIcon = (key, meta) => {
            const ns = NODE_STYLE[key] || NODE_STYLE.wp;
            const size = 14;
            const r = 5;
            return (
              <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{ flexShrink: 0, verticalAlign: "middle" }}>
                <circle
                  cx={size/2} cy={size/2} r={r}
                  fill={ns.fillOpacity === 1 ? meta.color : "none"}
                  fillOpacity={ns.fillOpacity}
                  stroke={meta.color}
                  strokeWidth={ns.ringWidth * 0.7}
                  strokeOpacity={ns.strokeOpacity}
                  strokeDasharray={ns.dash === "none" ? undefined : ns.dash}
                />
                {ns.innerDot && (
                  <circle
                    cx={size/2} cy={size/2} r={key === "progress" ? 2 : 2.5}
                    fill={meta.color}
                    fillOpacity={key === "progress" ? 0.5 : 0.75}
                  />
                )}
              </svg>
            );
          };

          return (
            <div style={{
              fontFamily: "'DM Sans', -apple-system, sans-serif",
              background: C.bg, minHeight: "100vh", position: "relative", overflow: "hidden",
            }}>
              {/* Film grain overlay */}
              <FilmGrain />

              {/* Nav bar — dark frosted glass */}
              <nav style={{
                position: "fixed", top: 0, left: 0, right: 0, zIndex: 100,
                background: "rgba(10,10,10,0.7)",
                backdropFilter: "blur(20px) saturate(1.5)",
                WebkitBackdropFilter: "blur(20px) saturate(1.5)",
                borderBottom: `1px solid ${C.borderLight}`,
              }}>
                <div style={{
                  maxWidth: 960, margin: "0 auto", padding: "0.85rem 1.5rem",
                  display: "flex", justifyContent: "space-between", alignItems: "baseline",
                }}>
                  <a href="index.html" style={{
                    fontFamily: "'DM Sans', sans-serif", fontSize: "0.85rem", fontWeight: 700,
                    color: C.textPrimary, textDecoration: "none", letterSpacing: "0.06em", textTransform: "uppercase",
                  }}>Devin Stein</a>
                  <a href="index.html" style={{
                    fontFamily: "'DM Sans', sans-serif", fontSize: "0.72rem", fontWeight: 600,
                    color: C.textSecondary, textDecoration: "none", letterSpacing: "0.06em", textTransform: "uppercase",
                  }}>&larr; Home</a>
                </div>
              </nav>

              {/* Header */}
              <div style={{ maxWidth: 960, margin: "0 auto", padding: "2rem 1.5rem 0", paddingTop: "4rem", position: "relative", zIndex: 2 }}>
                <div style={{
                  fontFamily: "'JetBrains Mono', monospace", fontSize: "0.62rem",
                  color: C.sienna, letterSpacing: "0.08em", textTransform: "uppercase",
                  marginBottom: "0.5rem", display: "flex", alignItems: "center", gap: "0.6rem",
                }}>
                  <span style={{ display: "block", width: 24, height: 1, background: C.sienna, opacity: 0.6 }} />
                  Interactive
                </div>
                <h1 style={{
                  fontFamily: "'Newsreader', Georgia, serif", fontSize: "1.8rem",
                  fontWeight: 400, color: C.textPrimary, margin: "0 0 0.3rem",
                }}>Research Network</h1>
                <p style={{
                  fontFamily: "'Newsreader', Georgia, serif",
                  fontSize: "0.85rem", color: C.textMuted, lineHeight: 1.6, maxWidth: 600, margin: "0 0 1.2rem",
                }}>
                  An interactive map of my research program. Projects are connected by shared theory, methods, and themes. Use the filters to explore the intellectual architecture, or drag nodes to rearrange.
                </p>

                {/* Filter bar */}
                <div style={{ display: "flex", gap: "1.8rem", flexWrap: "wrap", marginBottom: "1rem", alignItems: "flex-start" }}>
                  {Object.entries(FILTERS).map(([type, { label, options }]) => (
                    <div key={type}>
                      <div style={{
                        fontFamily: "'JetBrains Mono', monospace", fontSize: "0.58rem",
                        color: FILTER_COLORS[type], letterSpacing: "0.1em", textTransform: "uppercase",
                        marginBottom: "0.4rem", fontWeight: 500,
                      }}>{label}</div>
                      <div style={{ display: "flex", gap: "0.35rem", flexWrap: "wrap" }}>
                        {options.map(opt => {
                          const isActive = activeFilter?.type === type && activeFilter?.id === opt.id;
                          return (
                            <button
                              key={opt.id}
                              onClick={() => toggleFilter(type, opt.id)}
                              style={{
                                fontFamily: "'JetBrains Mono', monospace", fontSize: "0.6rem",
                                letterSpacing: "0.02em",
                                color: isActive ? C.white : C.textMuted,
                                background: isActive ? FILTER_COLORS[type] : "transparent",
                                border: `1px solid ${isActive ? FILTER_COLORS[type] : C.borderMid}`,
                                padding: "0.2rem 0.55rem", cursor: "pointer",
                                borderRadius: 1, transition: "all 0.15s",
                              }}
                            >{opt.label}</button>
                          );
                        })}
                      </div>
                    </div>
                  ))}
                </div>

                {/* Legend */}
                <div style={{ display: "flex", gap: "1.2rem", marginBottom: "0.8rem", flexWrap: "wrap" }}>
                  {Object.entries(STATUS_META).map(([key, meta]) => (
                    <div key={key} style={{ display: "flex", alignItems: "center", gap: "0.4rem" }}>
                      {legendIcon(key, meta)}
                      <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: "0.6rem", color: C.textMuted }}>
                        {meta.label}
                      </span>
                    </div>
                  ))}
                </div>
              </div>

              {/* Graph area with star field */}
              <div ref={containerRef} style={{ maxWidth: 960, margin: "0 auto", padding: "0 1.5rem", position: "relative" }}>
                <div style={{
                  background: "transparent",
                  borderRadius: 2, overflow: "hidden", position: "relative",
                  display: "flex", justifyContent: "center",
                }}>
                  {/* Star field canvas behind the SVG */}
                  <StarField />

                  <svg ref={svgRef} width={dims.width} height={dims.height} style={{ display: "block", position: "relative", zIndex: 1 }} />
                </div>

                {/* Selected detail — dark glass panel */}
                {selected && (
                  <div style={{
                    background: "rgba(20,20,20,0.8)",
                    backdropFilter: "blur(16px) saturate(1.3)",
                    WebkitBackdropFilter: "blur(16px) saturate(1.3)",
                    border: `1px solid ${C.borderMid}`,
                    borderLeft: `3px solid ${STATUS_META[selected.status]?.color || C.teal}`,
                    boxShadow: "0 2px 24px rgba(0,0,0,0.3)",
                    padding: "1.4rem 1.6rem", marginTop: "0.6rem",
                    animation: "fadeUp 0.25s ease",
                  }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                      <div>
                        <div style={{
                          fontFamily: "'JetBrains Mono', monospace", fontSize: "0.6rem",
                          color: STATUS_META[selected.status]?.color, letterSpacing: "0.04em",
                          textTransform: "uppercase", fontWeight: 500, marginBottom: "0.25rem",
                        }}>
                          {STATUS_META[selected.status]?.label}{selected.venue ? ` · ${selected.venue}` : ""}{selected.year ? ` · ${selected.year}` : ""}
                        </div>
                        <div style={{
                          fontFamily: "'Newsreader', Georgia, serif", fontSize: "1.15rem",
                          color: C.textPrimary, marginBottom: "0.15rem",
                        }}>{selected.label}</div>
                        <div style={{ fontSize: "0.78rem", color: C.textMuted, marginBottom: "0.6rem" }}>
                          {selected.coauthors}
                        </div>
                      </div>
                      <button
                        onClick={() => setSelected(null)}
                        style={{
                          background: "none", border: `1px solid ${C.borderMid}`,
                          fontFamily: "'JetBrains Mono', monospace", fontSize: "0.58rem",
                          color: C.textMuted, padding: "0.2rem 0.5rem", cursor: "pointer", flexShrink: 0,
                        }}>✕</button>
                    </div>
                    <p style={{
                      fontSize: "0.9rem", color: C.textSecondary, lineHeight: 1.75,
                      fontFamily: "'Newsreader', Georgia, serif", margin: "0 0 0.8rem",
                    }}>{selected.summary}</p>
                    {selected.url && (
                      <a
                        href={selected.url}
                        target="_blank"
                        rel="noopener noreferrer"
                        style={{
                          display: "inline-flex", alignItems: "center", gap: "0.4rem",
                          fontFamily: "'JetBrains Mono', monospace", fontSize: "0.64rem",
                          color: C.tealLight, textDecoration: "none", fontWeight: 500,
                          borderBottom: "1px solid transparent", transition: "border-color 0.2s",
                          marginBottom: "0.8rem",
                        }}
                        onMouseOver={e => e.target.style.borderBottomColor = C.tealLight}
                        onMouseOut={e => e.target.style.borderBottomColor = "transparent"}
                      >
                        {selected.status === "published" ? "View paper ↗" : "View abstract ↗"}
                      </a>
                    )}
                    <div style={{ display: "flex", gap: "0.5rem", flexWrap: "wrap", marginTop: selected.url ? "0" : "0" }}>
                      {[...selected.themes, ...selected.methods, ...selected.theories].map((tag, i) => (
                        <span key={i} style={{
                          fontFamily: "'JetBrains Mono', monospace", fontSize: "0.56rem",
                          color: C.textMuted, border: `1px solid ${C.borderLight}`, padding: "0.15rem 0.45rem",
                          letterSpacing: "0.02em",
                        }}>{tag}</span>
                      ))}
                    </div>
                  </div>
                )}
              </div>

              {/* Footer */}
              <div style={{
                maxWidth: 960, margin: "0 auto", padding: "1.2rem 1.5rem 0",
                position: "relative", zIndex: 2,
              }}>
                <p style={{
                  fontFamily: "'JetBrains Mono', monospace", fontSize: "0.58rem",
                  color: C.textFaint, letterSpacing: "0.02em",
                }}>
                  Click a node for details · Drag to rearrange · Scroll to zoom
                </p>
              </div>

              {/* Dusk/twilight horizon gradient at bottom */}
              <div style={{
                position: "relative", zIndex: 0,
                height: 120, marginTop: "1rem",
                background: `linear-gradient(180deg,
                  transparent 0%,
                  rgba(240,202,138,0.06) 20%,
                  rgba(217,152,96,0.08) 40%,
                  rgba(196,128,88,0.1) 55%,
                  rgba(150,95,105,0.08) 70%,
                  rgba(120,85,120,0.06) 85%,
                  rgba(80,65,115,0.04) 100%
                )`,
              }}>
                {/* Subtle sun glow */}
                <div style={{
                  position: "absolute", bottom: -40, left: "50%", transform: "translateX(-50%)",
                  width: 400, height: 80,
                  background: "radial-gradient(ellipse at center, rgba(240,202,138,0.1) 0%, rgba(217,152,96,0.05) 40%, transparent 70%)",
                  pointerEvents: "none",
                }} />
              </div>

              <style>{`
                @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
                button:hover { opacity: 0.85; }
              `}</style>
            </div>
          );
        }

        // Render the React app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ResearchNetwork />);
    </script>
</body>
</html>
